<!DOCTYPE html>
<html>
<head>
  <title>MapTiler + GPX Overlay</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script type="importmap">
        {
        "imports": {
            "leaflet": "https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js",
            "leaflet-gpx": "./gpx.js"
        }
        }
    </script>
    <script type="module">
        import { Map, TileLayer } from 'leaflet';
        import { GPX } from 'leaflet-gpx';

        const map = new Map('map');
        new TileLayer('https://api.maptiler.com/tiles/uk-osgb10k1888/{z}/{x}/{y}.jpg?key=BnDgv89mXDjK9jv4TIw9', {
        attribution: '© MapTiler',
        }).addTo(map);

        // URL to your GPX file or the GPX itself as a XML string.
        const url = './route.gpx';
        const options = {
        async: true,
        polyline_options: { color: 'red' },
        };

        new GPX(url, options).on('loaded', (e) => {
        map.fitBounds(e.target.getBounds());
        }).addTo(map);
        </script>
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

</body>
</html>
